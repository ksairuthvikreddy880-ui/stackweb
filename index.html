<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackweb | Premium Web Design Agency</title>
    <meta name="description" content="Stackweb creates high-contrast, deeply animated, and premium web experiences for clients worldwide.">
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    
    <!-- Preload critical assets -->
    <link rel="preload" href="styles.css" as="style">
    <link rel="preload" href="app.js" as="script">
    <link rel="preload" href="assets/hero_bg.png" as="image">
    
    <!-- Inline Critical CSS -->
    <style>:root{--bg-dark:#050505;--text-main:#fff;--text-muted:#a0a0a0;--accent-cyan:#00f0ff;--accent-violet:#8a2be2;--glass-bg:rgba(255,255,255,.03);--glass-border:rgba(255,255,255,.08);--glass-blur:blur(16px);--font-main:'Outfit',sans-serif;--nav-height:80px;--transition-fast:.2s cubic-bezier(.25,.46,.45,.94);--transition-slow:.6s cubic-bezier(.16,1,.3,1)}*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;background-color:var(--bg-dark)}body{font-family:var(--font-main);background-color:var(--bg-dark);color:var(--text-main);line-height:1.6;overflow-x:hidden;position:relative;min-height:100vh;display:flex;flex-direction:column}.navbar{position:fixed;top:0;left:0;width:100%;height:var(--nav-height);background:rgba(5,5,5,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);z-index:1000}.nav-container{max-width:1200px;margin:0 auto;padding:0 2rem;height:100%;display:flex;justify-content:space-between;align-items:center}.logo{font-size:1.5rem;font-weight:800;letter-spacing:-.05em;text-decoration:none;color:var(--text-main)}.text-accent{color:var(--accent-cyan);text-shadow:0 0 10px rgba(0,240,255,.3)}.btn-primary{display:inline-block;padding:.8rem 1.8rem;background:var(--text-main);color:var(--bg-dark)!important;font-weight:600;border-radius:30px;border:2px solid var(--text-main);cursor:pointer;font-family:var(--font-main);font-size:1rem;text-decoration:none}</style>
    
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Defer non-critical CSS -->
    <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="styles.css"></noscript>
</head>
<body>
    
    <!-- Background Animated Elements -->
    <div class="bg-gradient bg-gradient-1"></div>
    <div class="bg-gradient bg-gradient-2"></div>
    <div class="grid-overlay"></div>

    <!-- Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" data-link="home">Stack<span>web</span></a>
            
            <button class="mobile-menu-btn" aria-label="Toggle Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav class="nav-links">
                <a href="#" class="nav-link active" data-link="home">Home</a>
                <a href="#" class="nav-link" data-link="designs">Designs</a>
                <a href="#" class="nav-link" data-link="about">About</a>
                <a href="#" class="nav-link" data-link="help">Help</a>
                <a href="admin.html" class="nav-link" style="color: var(--accent-violet);">Admin</a>
                <a href="project-form.html" class="nav-link btn-primary">Start a Project</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Area for SPA Routing -->
    <main id="app-content">
        <!-- Views will be injected here via app.js -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <h2>Stack<span>web</span></h2>
                <p>We build great websites with high contrast and incredible experiences.</p>
            </div>
            <div class="footer-links">
                <a href="https://www.instagram.com/stackweb.dev" target="_blank" rel="noopener noreferrer" class="social-link">Instagram</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; <span id="year"></span> Stackweb. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js" defer></script>
    <script>
        // Initialize performance monitoring
        if ('performance' in window && (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')) {
            window.addEventListener('load', () => {
                const script = document.createElement('script');
                script.src = 'js/performance.js';
                script.defer = true;
                document.body.appendChild(script);
            });
        }
    </script>
    
    <!-- Click Spark Effect -->
    <script src="js/clickSpark.js" defer></script>
    
    <!-- Unregister service worker if exists -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('Service worker unregistered');
                }
            });
        }
    </script>
</body>
</html>
